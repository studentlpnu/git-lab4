name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    # 1. Використання Linux (Ubuntu) як віртуальну машину
    runs-on: ubuntu-latest
    env:
      VITE_PIXABAY_KEY: ${{ secrets.VITE_PIXABAY_KEY }}

    steps:
      # Крок 1: Копіювання коду репозиторію на віртуальну машину
      - name: Checkout repository
        uses: actions/checkout@v4

      # Крок 2: Встановлення Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Кешування прискорює наступні запуски

      # Крок 3: Чисте встановлення залежностей (згідно з lock-файлом)
      - name: Install dependencies
        run: npm ci

      # Крок 4: Перевірка лінтером (стиль коду)
      - name: Run Lint
        run: npm run lint

      # Крок 5: Запуск юніт-тестів
      - name: Run Unit Tests
        run: npm run test:unit
